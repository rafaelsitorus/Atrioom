# CI untuk semua PR ke staging/main.
# Job terpisah agar 1 gagal tidak memblokir yang lain.

name: CI

on:
  pull_request:
    branches: [staging, main]
  push:
    branches-ignore: [staging, main]

jobs:
  typecheck-api:
    name: Typecheck (api)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9.12.0
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @atrioom/api typecheck

  typecheck-web:
    name: Typecheck (web)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9.12.0
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @atrioom/web typecheck

  build-web:
    name: Build (web)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9.12.0
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Build
        env:
          # Placeholder — CI build tidak butuh kredensial asli
          NEXT_PUBLIC_SUPABASE_URL: https://placeholder.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: placeholder-anon-key-for-ci-build-only
          INTERNAL_API_BASE_URL: http://localhost:4000
        run: pnpm --filter @atrioom/web build

  commitlint:
    name: Commit Lint
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: pnpm/action-setup@v4
        with:
          version: 9.12.0
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Lint commits on push (all)
        if: github.event_name == 'push'
        run: npx commitlint --from=HEAD~10 --to=HEAD --verbose
      - name: Lint commits on PR (vs base)
        if: github.event_name == 'pull_request'
        run: npx commitlint --from=${{ github.event.pull_request.base.sha }} --to=HEAD --verbose